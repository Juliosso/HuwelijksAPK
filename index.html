<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Exit Poll</title>
    <style>
        /* --- Moderne, Professionele YM UI Instellingen --- */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .achtergrond-logo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('YMtransparant.png'); 
            background-size: 100% 100%;
            background-position: center;
            opacity: 0.05; 
            z-index: -1; 
        }

        /* --- De Hoofdkaart (Glassmorphism) --- */
        .card {
            background-color: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            padding: 70px 60px; 
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center;
            width: 90%;
            max-width: 950px; 
            z-index: 10;
            position: relative;
            overflow: hidden;
        }

        h1 { color: #d4c4a8; font-size: 46px; margin-bottom: 15px; margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        p.vraag { color: #cbd5e1; font-size: 26px; font-weight: 300; margin-bottom: 70px; letter-spacing: 1px;}

        /* --- De Knoppen (Gestyled als echte interactieve elementen) --- */
        .smiley-container {
            display: flex;
            justify-content: center;
            gap: 30px; 
        }

        .stem-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 75px; /* Ietsje kleiner voor elegantere look */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 30px;
            border-radius: 25px; /* Ronde vierkanten (squircle) i.p.v. perfecte cirkel */
            outline: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 180px;
        }

        .stem-btn span {
            font-size: 16px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            transition: color 0.3s;
        }

        /* Kleur op de knoppen als je zweeft */
        .stem-btn:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.1); border-color: rgba(212, 196, 168, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .stem-btn:active { transform: scale(0.95); }
        .stem-btn:hover span { color: #d4c4a8; }
        .stem-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; background: rgba(255, 255, 255, 0.02); border-color: rgba(255, 255, 255, 0.05); }

        /* --- Bedankt Overlay Animatie (Donker) --- */
        .bedankt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95); /* Donkere overlay i.p.v. wit */
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out;
            border-radius: 30px;
        }

        .bedankt-overlay h2 { font-size: 55px; color: #d4c4a8; margin: 0 0 15px 0; font-weight: 300; }
        .bedankt-overlay p { font-size: 24px; color: #cbd5e1; margin: 0; font-weight: 300; }

        /* --- Geheime Beheerder functionaliteit --- */
        .geheime-knop { position: absolute; top: 0; right: 0; width: 150px; height: 150px; z-index: 999; cursor: default; }
        .admin-menu { display: none; position: absolute; top: 20px; left: 20px; background-color: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; min-width: 250px; }
        .admin-btn { background-color: #334155; color: #f8fafc; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 12px; display: block; width: 100%; transition: background 0.2s;}
        .admin-btn:hover { background-color: #475569; }
        .admin-btn.rood { background-color: #991b1b; margin-top: 20px;}
        .admin-btn.rood:hover { background-color: #b91c1c; }
        
        .uitslag-tekst { font-family: monospace; font-size: 16px; color: #e2e8f0; background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div class="geheime-knop" onclick="checkGeheimeKlik()"></div>
    <div class="achtergrond-logo"></div>

    <div class="card">
        <div class="bedankt-overlay" id="bedankt-overlay">
            <h2>✓ Bedankt!</h2>
            <p>We wensen je een veilige reis naar huis.</p>
        </div>

        <h1>Hoe vond je de avond?</h1>
        <p class="vraag">Tik op de reactie die het beste bij jou past.</p>

        <div class="smiley-container">
            <button class="stem-btn" onclick="stem(0)">🤩 <span>Fantastisch</span></button>
            <button class="stem-btn" onclick="stem(1)">😊 <span>Leerzaam</span></button>
            <button class="stem-btn" onclick="stem(2)">😐 <span>Prima</span></button>
            <button class="stem-btn" onclick="stem(3)">😕 <span>Kon beter</span></button>
        </div>
    </div>

    <div class="admin-menu" id="admin-menu">
        <strong style="display: block; margin-bottom: 20px; color: #d4c4a8; font-size: 20px; font-weight: 400; text-transform: uppercase;">Beheer & Live Uitslag</strong>
        
        <div class="uitslag-tekst" id="live-uitslag">
            Laden...
        </div>

        <button class="admin-btn" onclick="slaOpAlsTXT()">📥 Download Uitslag (.txt)</button>
        <button class="admin-btn rood" onclick="resetStemmen()">🗑️ Reset Alle Stemmen</button>
        <button class="admin-btn" onclick="sluitAdmin()">❌ Sluit Paneel</button>
    </div>

    <script>
        let stemmen = JSON.parse(localStorage.getItem('exitStemmenKiosk')) || [0, 0, 0, 0];

        // --- Geheime Beheerder Logica ---
        let klikTeller = 0;
        let klikTimer;

        function checkGeheimeKlik() {
            klikTeller++;
            clearTimeout(klikTimer);
            klikTimer = setTimeout(() => { klikTeller = 0; }, 2000);

            if (klikTeller >= 5) {
                klikTeller = 0; 
                let pin = prompt("Pincode (Beheer):");
                if (pin === "0000") {
                    updateLiveUitslag();
                    document.getElementById('admin-menu').style.display = 'block';
                }
            }
        }

        function sluitAdmin() { document.getElementById('admin-menu').style.display = 'none'; }

        function updateLiveUitslag() {
            const uitslagDiv = document.getElementById('live-uitslag');
            uitslagDiv.innerHTML = `
                🤩 Fantastisch: <b>${stemmen[0]}</b><br><br>
                😊 Leerzaam: &nbsp;&nbsp;&nbsp;<b>${stemmen[1]}</b><br><br>
                😐 Prima: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>${stemmen[2]}</b><br><br>
                😕 Kon beter: &nbsp;&nbsp;<b>${stemmen[3]}</b>
            `;
        }

        // --- Stem logica & Animatie met Cooldown ---
        let kanStemmen = true;

        function stem(index) {
            if (!kanStemmen) return; 
            
            kanStemmen = false; // Blokkeer direct nieuwe inputs
            let knoppen = document.querySelectorAll('.stem-btn');
            knoppen.forEach(knop => knop.disabled = true);

            stemmen[index]++;
            localStorage.setItem('exitStemmenKiosk', JSON.stringify(stemmen));
            updateLiveUitslag(); 
            toonBedanktAnimatie();

            // Knoppen pas weer aanzetten als het bedank-scherm bijna weg is (1.5 sec)
            setTimeout(() => {
                kanStemmen = true;
                knoppen.forEach(knop => knop.disabled = false);
            }, 1500); 
        }

        function toonBedanktAnimatie() {
            const overlay = document.getElementById('bedankt-overlay');
            overlay.style.opacity = '1'; 
            
            setTimeout(() => { overlay.style.opacity = '0'; }, 1200);
        }

        // --- Opslaan ---
        function slaOpAlsTXT() {
            const tekst = `EINDSTAND YM EXIT POLL\n--------------------------\n🤩 Fantastisch: ${stemmen[0]}\n😊 Leerzaam: ${stemmen[1]}\n😐 Prima: ${stemmen[2]}\n😕 Kon beter: ${stemmen[3]}\n`;
            const blob = new Blob([tekst], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none'; a.href = url; a.download = 'YM_Exit_Uitslag.txt';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        }

        function resetStemmen() {
            if(confirm("Zeker weten? Alle stemmen gaan naar 0.")) {
                stemmen = [0, 0, 0, 0];
                localStorage.setItem('exitStemmenKiosk', JSON.stringify(stemmen));
                updateLiveUitslag();
                sluitAdmin();
            }
        }
    </script>
</body>
</html>
